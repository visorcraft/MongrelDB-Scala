name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build & offline tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: sbt

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Compile
        run: sbt -no-colors compile

      # Offline unit tests run without a daemon; the live tests self-skip when
      # no server binary is available.
      - name: Run tests
        run: sbt -no-colors test

  live:
    # Boots a real mongreldb-server and runs the live round-trip suite.
    name: Live integration (against mongreldb-server)
    runs-on: ubuntu-latest
    env:
      SERVER_VERSION: '0.49.0'
      MONGRELDB_URL: http://127.0.0.1:8453
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: sbt

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Compile
        run: sbt -no-colors compile

      - name: Cache mongreldb-server binary
        id: server-cache
        uses: actions/cache@v6
        with:
          path: bin/mongreldb-server
          key: mongreldb-server-linux-x64-${{ env.SERVER_VERSION }}

      - name: Download mongreldb-server
        if: steps.server-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p bin
          curl -fsSL -o bin/mongreldb-server \
            "https://github.com/visorcraft/MongrelDB/releases/download/v${SERVER_VERSION}/mongreldb-server-linux-x64"
          chmod +x bin/mongreldb-server
          ./bin/mongreldb-server --help | head -n 1

      - name: Start mongreldb-server
        run: |
          rm -rf /tmp/mongreldb-data
          ./bin/mongreldb-server /tmp/mongreldb-data --port 8453 > /tmp/mongreldb-server.log 2>&1 &
          echo $! > /tmp/mongreldb-server.pid
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8453/health >/dev/null 2>&1; then
              echo "mongreldb-server is healthy"
              break
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:8453/health >/dev/null || (cat /tmp/mongreldb-server.log && exit 1)

      - name: Run live tests
        run: sbt -no-colors test

      - name: Run examples
        run: |
          for cls in com.example.BasicCrud com.example.QueryBuilderExample com.example.TransactionsExample; do
            echo "=== Running $cls ==="
            sbt -no-colors "examples/runMain $cls" || { echo "FAILED: $cls"; exit 1; }
          done

      - name: Dump server log on failure
        if: failure()
        run: cat /tmp/mongreldb-server.log

      - name: Stop mongreldb-server
        if: always()
        run: |
          if [ -f /tmp/mongreldb-server.pid ]; then
            kill "$(cat /tmp/mongreldb-server.pid)" 2>/dev/null || true
          fi

  native:
    name: Native embedding (JNI)
    runs-on: ubuntu-latest
    env:
      SERVER_VERSION: '0.49.0'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: sbt/setup-sbt@v1

      - name: Download JNI library
        run: |
          mkdir -p native-libs
          curl -fsSL -o /tmp/jni.jar \
            "https://github.com/visorcraft/MongrelDB/releases/download/v${SERVER_VERSION}/mongreldb-jni-${SERVER_VERSION}-linux-x64.jar"
          unzip -j /tmp/jni.jar "native/linux/x64/*" -d native-libs

      - name: Compile
        run: sbt compile

      - name: Run native tests
        run: sbt "testOnly dev.visorcraft.mongreldb.NativeDBTest"
        env:
          MONGRELDB_NATIVE_DIR: ${{ github.workspace }}/native-libs
          JAVA_TOOL_OPTIONS: "-Djava.library.path=${{ github.workspace }}/native-libs"

      - name: Compile native example
        run: sbt "examples/compile"
        continue-on-error: true
