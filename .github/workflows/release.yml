# Publishes mongreldb-scala to Maven Central on a `v*` tag push.
#
# The new Central Publishing Portal has no sbt plugin, so we publish to the
# staging API via sbt's built-in publish, GPG-sign via sbt-pgp, then call the
# compatibility API to transfer it into an automatic Portal deployment.
#
# Required secrets (repo settings → Secrets and variables → Actions):
#   CENTRAL_USERNAME  - Central Portal token username
#   CENTRAL_PASSWORD  - Central Portal token password
#   GPG_PRIVATE_KEY   - ASCII-armored GPG signing key (--export-secret-keys --armor)
#   GPG_KEY_ID        - Key ID (e.g. ABCDEF1234567890)
#   GPG_PASSPHRASE    - GPG key passphrase

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 11

      - uses: sbt/setup-sbt@v1.5.0

      - name: Import GPG signing key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --dearmor --output /tmp/signing.gpg
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          gpg --batch --import /tmp/signing.gpg
          echo -e "5\ny\n" | gpg --batch --command-fd 0 --expert --edit-key ${{ secrets.GPG_KEY_ID }} trust

      - name: Publish to Central staging repository
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          PGP_SECRET: ${{ secrets.GPG_PRIVATE_KEY }}
          PGP_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: sbt -batch publishSigned

      - name: Publish staging deployment via Portal API
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
        run: |
          TOKEN=$(printf '%s:%s' "$CENTRAL_USERNAME" "$CENTRAL_PASSWORD" | base64 | tr -d '\n')
          curl -fsS -X POST \
            -H "Authorization: Bearer $TOKEN" \
            "https://ossrh-staging-api.central.sonatype.com/manual/upload/defaultRepository/com.visorcraft?publishing_type=automatic"
